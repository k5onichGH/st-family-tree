<div id="ft-modal" class="ft-modal">
    <div class="ft-modal-content">
        <div class="ft-header">
            <h2>Семейное древо</h2>
            <button id="ft-close-btn" class="menu_button">Закрыть</button>
        </div>
        <div class="ft-toolbar">
            <button id="ft-add-char-btn" class="menu_button">Добавить персонажа</button>
        </div>
        <!-- Рабочая область -->
        <div id="ft-workspace" class="ft-workspace">
            <!-- Слой для линий (связей) -->
            <svg id="ft-lines-layer"></svg>
            <!-- Слой для карточек персонажей -->
            <div id="ft-nodes-layer"></div>
        </div>
    </div>
</div>

<!-- Шаблон карточки персонажа (скрыт, используется в JS) -->
<template id="ft-node-template">
    <div class="ft-node">
        <div class="ft-node-icon">
            <img class="ft-avatar" src="" alt="Avatar">
        </div>
        <div class="ft-node-info">
            <div class="ft-name">Имя</div>
            <div class="ft-age">Возраст: <span></span></div>
            <div class="ft-status">Статус: <span></span></div>
        </div>
    </div>
</template>
